name: 🌙 Build SleepX Kernel

on:
  push:
    branches: [main, stable]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release?'
        required: true
        type: boolean
        default: false
      release_tag:
        description: 'Release tag (e.g. v1.1)'
        required: false
        default: ''
      release_notes:
        description: 'Changelog / release notes'
        required: false
        default: ''

env:
  # ── Kernel source ────────────────────────────────────────────
  KERNEL_REPO: https://github.com/LineageOS/android_kernel_xiaomi_sm8635
  KERNEL_BRANCH: lineage-23.2
  KERNEL_DEFCONFIG: gki_defconfig
  KERNEL_VENDOR_FRAGMENT: arch/arm64/configs/vendor/peridot_GKI.config

  # ── Toolchain: XClang / LLVM 22.1.2 ─────────────────────────
  CLANG_URL: https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.2/LLVM-22.1.2-Linux-X64.tar.xz

  # ── AnyKernel3 ───────────────────────────────────────────────
  ANYKERNEL_REPO: https://github.com/sleep-bugy/SleepX-AK3
  ANYKERNEL_BRANCH: main

  # ── Build info ───────────────────────────────────────────────
  ARCH: arm64
  DEVICE: peridot
  KERNEL_NAME: SleepX

jobs:
  build:
    name: 🔨 Build Kernel
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      # ─── 1. Dependencies ──────────────────────────────────────
      - name: 📦 Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio flex git \
            kmod libelf-dev libssl-dev make python3 unzip wget zip zstd \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      # ─── 2. Build variables ───────────────────────────────────
      - name: 🔖 Set build variables
        id: vars
        run: |
          DATE=$(date +'%Y%m%d')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          VERSION="${{ github.event.inputs.release_tag }}"
          [ -z "$VERSION" ] && VERSION="${DATE}-${SHORT_SHA}"
          ZIPNAME="${{ env.KERNEL_NAME }}-${{ env.DEVICE }}-${VERSION}.zip"

          echo "DATE=$DATE"           >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"     >> $GITHUB_OUTPUT
          echo "ZIPNAME=$ZIPNAME"     >> $GITHUB_OUTPUT

          echo "### 🌙 SleepX Kernel Build"             >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                         >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"                         >> $GITHUB_STEP_SUMMARY
          echo "| Device | peridot (SM8635) |"          >> $GITHUB_STEP_SUMMARY
          echo "| Source | LineageOS/android_kernel_xiaomi_sm8635 |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ env.KERNEL_BRANCH }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| Compiler | XClang / LLVM 22.1.2 |"    >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${VERSION} |"                >> $GITHUB_STEP_SUMMARY

      # ─── 3. Checkout kernel source ────────────────────────────
      - name: 📥 Checkout kernel source
        run: |
          git clone --depth=1 \
            -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} \
            kernel
          echo "✅ Kernel source ready"
          # Print kernel version dari Makefile
          head -5 kernel/Makefile

      # ─── 4. XClang 22.1.2 ────────────────────────────────────
      - name: 🛠️ Setup XClang / LLVM 22.1.2
        run: |
          mkdir -p $HOME/toolchains/clang
          echo "Downloading XClang / LLVM 22.1.2..."
          wget -q --show-progress \
            "${{ env.CLANG_URL }}" \
            -O clang.tar.xz
          tar -xf clang.tar.xz -C $HOME/toolchains/clang --strip-components=1
          rm clang.tar.xz
          echo "$HOME/toolchains/clang/bin" >> $GITHUB_PATH
          echo "✅ Toolchain ready:"
          $HOME/toolchains/clang/bin/clang --version

      # ─── 5. Defconfig (GKI base + peridot vendor fragment) ──────
      - name: 🔧 Generate defconfig
        working-directory: kernel
        run: |
          export PATH="$HOME/toolchains/clang/bin:$PATH"

          MAKE_ARGS="O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-"

          # Step 1: GKI base defconfig
          echo "Step 1: Loading gki_defconfig..."
          make -j$(nproc) O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            ${{ env.KERNEL_DEFCONFIG }}

          # Step 2: Merge vendor fragment peridot_GKI.config
          echo "Step 2: Merging vendor fragment..."
          VENDOR_FRAG="${{ env.KERNEL_VENDOR_FRAGMENT }}"
          if [ -f "$VENDOR_FRAG" ]; then
            ./scripts/kconfig/merge_config.sh -m -O out \
              out/.config \
              "$VENDOR_FRAG"
          else
            echo "❌ Vendor fragment tidak ditemukan: $VENDOR_FRAG"
            echo "Available vendor configs:"
            ls arch/arm64/configs/vendor/ 2>/dev/null || ls arch/arm64/configs/
            exit 1
          fi

          # Step 3: Finalize config
          echo "Step 3: Finalizing config..."
          make -j$(nproc) O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            olddefconfig

          echo "✅ Defconfig siap (gki_defconfig + peridot_GKI.config)"

      # ─── 6. Compile kernel ────────────────────────────────────
      - name: 🏗️ Compile kernel
        working-directory: kernel
        run: |
          export PATH="$HOME/toolchains/clang/bin:$PATH"
          BUILD_START=$(date +%s)

          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            2>&1 | tee ../build.log

          BUILD_END=$(date +%s)
          ELAPSED=$(( BUILD_END - BUILD_START ))
          BUILD_TIME=$(printf '%02dm:%02ds' $((ELAPSED/60)) $((ELAPSED%60)))
          echo "BUILD_TIME=${BUILD_TIME}" >> $GITHUB_ENV

          if [ ! -f out/arch/arm64/boot/Image.gz ]; then
            echo "❌ Build FAILED — Image.gz not found!"
            tail -100 ../build.log
            exit 1
          fi

          echo "✅ Build done in ${BUILD_TIME}"
          ls -lh out/arch/arm64/boot/

      - name: 📤 Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ steps.vars.outputs.SHORT_SHA }}
          path: build.log

      # ─── 7. Package AnyKernel3 ────────────────────────────────
      - name: 📦 Clone AnyKernel3
        run: |
          # Coba clone repo AnyKernel3 utama (SleepX-AK3)
          if git clone --depth=1 \
              -b ${{ env.ANYKERNEL_BRANCH }} \
              ${{ env.ANYKERNEL_REPO }} \
              AnyKernel3 2>/dev/null; then
            echo "✅ Cloned ${{ env.ANYKERNEL_REPO }}"
          else
            echo "⚠️ Repo AnyKernel3 tidak bisa diakses, fallback ke osm0sis/AnyKernel3..."
            git clone --depth=1 \
              https://github.com/osm0sis/AnyKernel3 \
              AnyKernel3

            # Inject anykernel.sh dari repo ini kalau ada
            if [ -f "$GITHUB_WORKSPACE/anykernel.sh" ]; then
              cp "$GITHUB_WORKSPACE/anykernel.sh" AnyKernel3/anykernel.sh
              echo "✅ anykernel.sh dari repo ini dipakai"
            else
              # Tulis anykernel.sh minimal untuk peridot menggunakan printf
              printf '%s\n' \
                "properties() { '" \
                "kernel.string=SleepX Kernel by ImSleep" \
                "do.devicecheck=1" \
                "do.modules=0" \
                "do.systemless=0" \
                "do.cleanup=1" \
                "do.cleanuponabort=0" \
                "device.name1=peridot" \
                "supported.versions=14 - 16" \
                "'; }" \
                "block=boot" \
                "is_slot_device=auto" \
                "ramdisk_compression=auto" \
                "patch_vbmeta_flag=auto" \
                "no_magisk_check=1" \
                ". tools/ak3-core.sh" \
                "split_boot" \
                "flash_boot" \
                > AnyKernel3/anykernel.sh
              echo "✅ anykernel.sh minimal ditulis otomatis"
            fi
          fi

      - name: 🗜️ Package kernel zip
        id: package
        run: |
          ZIPNAME="${{ steps.vars.outputs.ZIPNAME }}"

          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
          [ -f kernel/out/arch/arm64/boot/dtb.img ]  && cp kernel/out/arch/arm64/boot/dtb.img  AnyKernel3/ && echo "✅ DTB included"
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/ && echo "✅ DTBO included"

          cd AnyKernel3
          zip -r9 "../${ZIPNAME}" . \
            --exclude="*.git*" --exclude="*.github*" \
            --exclude="*.md"   --exclude="LICENSE"
          cd ..

          sha256sum "${ZIPNAME}" > "${ZIPNAME}.sha256"
          SIZE=$(du -sh "${ZIPNAME}" | cut -f1)
          SHA=$(awk '{print $1}' "${ZIPNAME}.sha256")

          echo "ZIP_SIZE=$SIZE" >> $GITHUB_OUTPUT
          echo "ZIP_SHA=$SHA"   >> $GITHUB_OUTPUT

          echo ""                                           >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Build Result"                        >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                            >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"                            >> $GITHUB_STEP_SUMMARY
          echo "| File | \`${ZIPNAME}\` |"                  >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${SIZE} |"                         >> $GITHUB_STEP_SUMMARY
          echo "| SHA256 | \`${SHA}\` |"                    >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | ${{ env.BUILD_TIME }} |"    >> $GITHUB_STEP_SUMMARY

      # ─── 8. Upload artifact ───────────────────────────────────
      - name: 📎 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.ZIPNAME }}
          path: |
            ${{ steps.vars.outputs.ZIPNAME }}
            ${{ steps.vars.outputs.ZIPNAME }}.sha256
          retention-days: 7

      # ─── 9. GitHub Release (manual only) ─────────────────────
      - name: 🚀 Create GitHub Release
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.release == 'true' &&
          github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "🌙 SleepX Kernel ${{ github.event.inputs.release_tag }} | POCO F6 (peridot)"
          body: |
            ## 🌙 SleepX Kernel ${{ github.event.inputs.release_tag }}

            | Info | Detail |
            |------|--------|
            | **Device** | Xiaomi POCO F6 / Redmi Turbo 3 (SM8635 / peridot) |
            | **Source** | [LineageOS/android_kernel_xiaomi_sm8635](https://github.com/LineageOS/android_kernel_xiaomi_sm8635) @ `lineage-22.2` |
            | **Compiler** | XClang / LLVM 22.1.2 |
            | **Build Date** | ${{ steps.vars.outputs.DATE }} |
            | **Android** | 14 - 16 |
            | **Build Time** | ${{ env.BUILD_TIME }} |
            | **SHA256** | `${{ steps.package.outputs.ZIP_SHA }}` |

            ---

            ### 📋 Changelog
            ${{ github.event.inputs.release_notes || 'See commit history for changes.' }}

            ---

            ### ⚡ Features
            - **Networking:** BBRplus, BBRv3, TCP Brutal, TCP Fast Open
            - **Feature:** NTSync, Wireguard, ADIOS I/O Scheduler
            - **Memory:** Backport per-memcg reclaim & vmpressure optimization
            - **Charging:** `charging_enabled` node & fastcharge mode 1 detection
            - **Hardware:** Dual fuel gauge support (SLAVE_CHIP guard)
            - **Touch/Display:** Xiaomi touch driver, fold_status, FOD finger state node

            ---

            ### 📲 Cara Install
            1. Download zip di bawah
            2. Boot ke custom recovery (TWRP / OrangeFox)
            3. Flash zip → Reboot

            > ⚠️ Butuh unlocked bootloader + custom recovery

            ---

            ### 🔐 Verifikasi Integritas
            ```bash
            sha256sum -c ${{ steps.vars.outputs.ZIPNAME }}.sha256
            ```
          files: |
            ${{ steps.vars.outputs.ZIPNAME }}
            ${{ steps.vars.outputs.ZIPNAME }}.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # ─── 3. Checkout kernel source ────────────────────────────
      - name: 📥 Checkout kernel source
        run: |
          git clone --depth=1 \
            -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} \
            kernel
          echo "✅ Kernel source ready"
          # Print kernel version dari Makefile
          head -5 kernel/Makefile

      # ─── 4. XClang 22.1.2 ────────────────────────────────────
      - name: 🛠️ Setup XClang / LLVM 22.1.2
        run: |
          mkdir -p $HOME/toolchains/clang
          echo "Downloading XClang / LLVM 22.1.2..."
          wget -q --show-progress \
            "${{ env.CLANG_URL }}" \
            -O clang.tar.xz
          tar -xf clang.tar.xz -C $HOME/toolchains/clang --strip-components=1
          rm clang.tar.xz
          echo "$HOME/toolchains/clang/bin" >> $GITHUB_PATH
          echo "✅ Toolchain ready:"
          $HOME/toolchains/clang/bin/clang --version

      # ─── 5. Defconfig ─────────────────────────────────────────
      - name: 🔧 Generate defconfig
        working-directory: kernel
        run: |
          export PATH="$HOME/toolchains/clang/bin:$PATH"

          # Cek apakah defconfig ada, fallback jika tidak
          if [ -f "arch/arm64/configs/vendor/peridot_defconfig" ]; then
            DEFCONFIG="vendor/peridot_defconfig"
          elif [ -f "arch/arm64/configs/peridot_defconfig" ]; then
            DEFCONFIG="peridot_defconfig"
          else
            echo "⚠️ peridot_defconfig not found, listing available configs:"
            ls arch/arm64/configs/ | grep -i peridot || ls arch/arm64/configs/
            exit 1
          fi

          echo "Using defconfig: $DEFCONFIG"
          echo "DEFCONFIG=$DEFCONFIG" >> $GITHUB_ENV

          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            $DEFCONFIG

          echo "✅ Defconfig generated"

      # ─── 6. Compile kernel ────────────────────────────────────
      - name: 🏗️ Compile kernel
        working-directory: kernel
        run: |
          export PATH="$HOME/toolchains/clang/bin:$PATH"
          BUILD_START=$(date +%s)

          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            2>&1 | tee ../build.log

          BUILD_END=$(date +%s)
          ELAPSED=$(( BUILD_END - BUILD_START ))
          BUILD_TIME=$(printf '%02dm:%02ds' $((ELAPSED/60)) $((ELAPSED%60)))
          echo "BUILD_TIME=${BUILD_TIME}" >> $GITHUB_ENV

          if [ ! -f out/arch/arm64/boot/Image.gz ]; then
            echo "❌ Build FAILED — Image.gz not found!"
            tail -100 ../build.log
            exit 1
          fi

          echo "✅ Build done in ${BUILD_TIME}"
          ls -lh out/arch/arm64/boot/

      - name: 📤 Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ steps.vars.outputs.SHORT_SHA }}
          path: build.log

      # ─── 7. Package AnyKernel3 ────────────────────────────────
      - name: 📦 Clone AnyKernel3
        run: |
          # Coba clone repo AnyKernel3 utama (SleepX-AK3)
          if git clone --depth=1 \
              -b ${{ env.ANYKERNEL_BRANCH }} \
              ${{ env.ANYKERNEL_REPO }} \
              AnyKernel3 2>/dev/null; then
            echo "✅ Cloned ${{ env.ANYKERNEL_REPO }}"
          else
            echo "⚠️ Repo AnyKernel3 tidak bisa diakses, fallback ke osm0sis/AnyKernel3..."
            git clone --depth=1 \
              https://github.com/osm0sis/AnyKernel3 \
              AnyKernel3

            # Inject anykernel.sh dari repo ini kalau ada
            if [ -f "$GITHUB_WORKSPACE/anykernel.sh" ]; then
              cp "$GITHUB_WORKSPACE/anykernel.sh" AnyKernel3/anykernel.sh
              echo "✅ anykernel.sh dari repo ini dipakai"
            else
              # Tulis anykernel.sh minimal untuk peridot menggunakan printf
              printf '%s\n' \
                "properties() { '" \
                "kernel.string=SleepX Kernel by ImSleep" \
                "do.devicecheck=1" \
                "do.modules=0" \
                "do.systemless=0" \
                "do.cleanup=1" \
                "do.cleanuponabort=0" \
                "device.name1=peridot" \
                "supported.versions=14 - 16" \
                "'; }" \
                "block=boot" \
                "is_slot_device=auto" \
                "ramdisk_compression=auto" \
                "patch_vbmeta_flag=auto" \
                "no_magisk_check=1" \
                ". tools/ak3-core.sh" \
                "split_boot" \
                "flash_boot" \
                > AnyKernel3/anykernel.sh
              echo "✅ anykernel.sh minimal ditulis otomatis"
            fi
          fi

      - name: 🗜️ Package kernel zip
        id: package
        run: |
          ZIPNAME="${{ steps.vars.outputs.ZIPNAME }}"

          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
          [ -f kernel/out/arch/arm64/boot/dtb.img ]  && cp kernel/out/arch/arm64/boot/dtb.img  AnyKernel3/ && echo "✅ DTB included"
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/ && echo "✅ DTBO included"

          cd AnyKernel3
          zip -r9 "../${ZIPNAME}" . \
            --exclude="*.git*" --exclude="*.github*" \
            --exclude="*.md"   --exclude="LICENSE"
          cd ..

          sha256sum "${ZIPNAME}" > "${ZIPNAME}.sha256"
          SIZE=$(du -sh "${ZIPNAME}" | cut -f1)
          SHA=$(awk '{print $1}' "${ZIPNAME}.sha256")

          echo "ZIP_SIZE=$SIZE" >> $GITHUB_OUTPUT
          echo "ZIP_SHA=$SHA"   >> $GITHUB_OUTPUT

          echo ""                                           >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Build Result"                        >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                            >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"                            >> $GITHUB_STEP_SUMMARY
          echo "| File | \`${ZIPNAME}\` |"                  >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${SIZE} |"                         >> $GITHUB_STEP_SUMMARY
          echo "| SHA256 | \`${SHA}\` |"                    >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | ${{ env.BUILD_TIME }} |"    >> $GITHUB_STEP_SUMMARY

      # ─── 8. Upload artifact ───────────────────────────────────
      - name: 📎 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.ZIPNAME }}
          path: |
            ${{ steps.vars.outputs.ZIPNAME }}
            ${{ steps.vars.outputs.ZIPNAME }}.sha256
          retention-days: 7

      # ─── 9. GitHub Release (manual only) ─────────────────────
      - name: 🚀 Create GitHub Release
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.release == 'true' &&
          github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "🌙 SleepX Kernel ${{ github.event.inputs.release_tag }} | POCO F6 (peridot)"
          body: |
            ## 🌙 SleepX Kernel ${{ github.event.inputs.release_tag }}

            | Info | Detail |
            |------|--------|
            | **Device** | Xiaomi POCO F6 / Redmi Turbo 3 (SM8635 / peridot) |
            | **Source** | [LineageOS/android_kernel_xiaomi_sm8635](https://github.com/LineageOS/android_kernel_xiaomi_sm8635) @ `lineage-22.2` |
            | **Compiler** | XClang / LLVM 22.1.2 |
            | **Build Date** | ${{ steps.vars.outputs.DATE }} |
            | **Android** | 14 - 16 |
            | **Build Time** | ${{ env.BUILD_TIME }} |
            | **SHA256** | `${{ steps.package.outputs.ZIP_SHA }}` |

            ---

            ### 📋 Changelog
            ${{ github.event.inputs.release_notes || 'See commit history for changes.' }}

            ---

            ### ⚡ Features
            - **Networking:** BBRplus, BBRv3, TCP Brutal, TCP Fast Open
            - **Feature:** NTSync, Wireguard, ADIOS I/O Scheduler
            - **Memory:** Backport per-memcg reclaim & vmpressure optimization
            - **Charging:** `charging_enabled` node & fastcharge mode 1 detection
            - **Hardware:** Dual fuel gauge support (SLAVE_CHIP guard)
            - **Touch/Display:** Xiaomi touch driver, fold_status, FOD finger state node

            ---

            ### 📲 Cara Install
            1. Download zip di bawah
            2. Boot ke custom recovery (TWRP / OrangeFox)
            3. Flash zip → Reboot

            > ⚠️ Butuh unlocked bootloader + custom recovery

            ---

            ### 🔐 Verifikasi Integritas
            ```bash
            sha256sum -c ${{ steps.vars.outputs.ZIPNAME }}.sha256
            ```
          files: |
            ${{ steps.vars.outputs.ZIPNAME }}
            ${{ steps.vars.outputs.ZIPNAME }}.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
