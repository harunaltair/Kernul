name: "Build Peridot SM8635 Kernel - GKI (No KernelSU)"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🔨 Build Peridot GKI Kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}

    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}
      withKernelSU: ${{ matrix.repos.withKernelSU }}

    steps:
      - name: "✨ Create working dir"
        run: mkdir -p $kernelDir

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential bc curl git zip ftp \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools jq \
          flex bison
      - name: "🌟 Clone kernel source"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive --branch $kernelBranch $kernelRepo $kernelName --depth=1

      - name: "💫 Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          echo "Downloading $toolchains_num toolchains..."

          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")

            git clone --recursive --branch $branch $repo $name --depth=1

            echo "$(pwd)/$name/" >> $GITHUB_PATH
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

          echo "Toolchains ready"

      - name: "😎 Set build arguments"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          CROSS_COMPILE=$(echo $params | jq -r ".CROSS_COMPILE")
          CROSS_COMPILE_COMPAT=$(echo $params | jq -r ".CROSS_COMPILE_COMPAT")
          CLANG_TRIPLE=$(echo $params | jq -r ".CLANG_TRIPLE")
          AR=$(echo $params | jq -r ".AR")
          CC=$(echo $params | jq -r ".CC")

          echo "ARCH=$ARCH" >> $GITHUB_ENV

          KERNEL_PATH=$(pwd)/${{ env.kernelName }}
          OUT_PATH=$KERNEL_PATH/${{ env.OUT_DIR }}

          mkdir -p $OUT_PATH

          args="-j$(nproc --all)"
          args="$args O=$OUT_PATH"

          if [ -n "$ARCH" ]; then
            args="$args ARCH=$ARCH"
          fi
          if [ -n "$CROSS_COMPILE" ]; then
            args="$args CROSS_COMPILE=$CROSS_COMPILE"
          fi
          if [ -n "$CLANG_TRIPLE" ]; then
            args="$args CLANG_TRIPLE=$CLANG_TRIPLE"
          fi
          if [ -n "$CROSS_COMPILE_COMPAT" ]; then
            args="$args CROSS_COMPILE_ARM32=$CROSS_COMPILE_COMPAT"
          fi
          if [ -n "$AR" ]; then
            args="$args AR=$AR"
          fi
          if [ -n "$CC" ]; then
            args="$args CC=$CC"
          fi

          echo "args=$args"
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "🧹 Clean output"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        run: |
          rm -rf ${{ env.OUT_DIR }}

      - name: "👍 Configure kernel (GKI + Peridot)"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "Using args: $args"

          # Base config
          make $args gki_defconfig

          # Merge vendor config INTO OUT
          cat arch/arm64/configs/vendor/peridot_GKI.config >> ${{ env.OUT_DIR }}/.config

          # Finalize config
          make $args olddefconfig

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          make $args

      - name: "🎶 Build kernel (verbose)"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
         args: ${{ steps.generate-args.outputs.args }}
        run: |
         set -e
         make $args V=1 2>&1 | tee build.log

      - name: "📦 Upload Kernel Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image-Peridot-GKI
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image
          if-no-files-found: ignore
          retention-days: 7

      - name: "📦 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-Peridot-GKI
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: "📦 Upload DTB"
        uses: actions/upload-artifact@v4
        with:
          name: dtb-Peridot-GKI
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

      - name: "📦 Upload DTBO.img"
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img-Peridot-GKI
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/arm64/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7
